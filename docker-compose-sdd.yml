version: '3.9'

services:
  # ✅ PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: stark-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-stark_security_db}
      POSTGRES_USER: ${DB_USER:-stark_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stark_secure_password_123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - stark-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-stark_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # ✅ RabbitMQ Message Broker (Commands & Requests)
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: stark-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"     # AMQP port
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - stark-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # ✅ Kafka Message Broker (Events & Streams)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: stark-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
    ports:
      - "2181:2181"
    networks:
      - stark-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: stark-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    networks:
      - stark-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "kafka:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # ✅ Kafka UI (Dashboard)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: stark-kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: stark
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8888:8080"
    networks:
      - stark-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # ✅ Redis (Distributed Cache & State)
  redis:
    image: redis:7-alpine
    container_name: stark-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - stark-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # ✅ Eureka Config Server
  config-server:
    build:
      context: .
      dockerfile: starkDistribuidos-config/Dockerfile
    container_name: stark-config-server
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_USER: ${EUREKA_USER:-admin}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-Eureka@Secure2024!}
    ports:
      - "8761:8761"
    networks:
      - stark-network
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # ✅ Auth Service with Agent
  auth-service:
    build:
      context: .
      dockerfile: starkDistribuidos-auth/Dockerfile
    container_name: stark-auth-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-stark_security_db}
      DB_USER: ${DB_USER:-stark_user}
      DB_PASSWORD: ${DB_PASSWORD:-stark_secure_password_123}
      # Message Brokers
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      KAFKA_BROKERS: kafka:9092
      # Cache
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_password}
      # Security
      SECURITY_USER_NAME: ${SECURITY_USER_NAME:-admin}
      SECURITY_USER_PASSWORD: ${SECURITY_USER_PASSWORD:-Admin@Secure2024!}
      JWT_SECRET: ${JWT_SECRET:-StarkIndustriesSecuritySystemJWTSecretKeyForMicroservices2024}
      # Service Config
      SERVICE_NAME: auth-service
      SERVICE_AGENT_ENABLED: "true"
    ports:
      - "8081:8081"
    networks:
      - stark-network
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # ✅ API Gateway with Orchestrator
  gateway:
    build:
      context: .
      dockerfile: starkDistribuidos-gateway/Dockerfile
    container_name: stark-gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # Message Brokers
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      KAFKA_BROKERS: kafka:9092
      # Cache
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_password}
      # Orchestrator
      ORCHESTRATOR_ENABLED: "true"
      SERVICE_NAME: gateway
    ports:
      - "8080:8080"
    networks:
      - stark-network
    depends_on:
      - auth-service
      - config-server
      - rabbitmq
      - kafka
      - redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # ✅ Sensor Service with Agent
  sensor-service:
    build:
      context: .
      dockerfile: starkDistribuidos-sensor/Dockerfile
    container_name: stark-sensor-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-stark_security_db}
      DB_USER: ${DB_USER:-stark_user}
      DB_PASSWORD: ${DB_PASSWORD:-stark_secure_password_123}
      # Message Brokers
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      KAFKA_BROKERS: kafka:9092
      # Cache
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_password}
      # Service
      SERVICE_NAME: sensor-service
      SERVICE_AGENT_ENABLED: "true"
    ports:
      - "8082:8082"
    networks:
      - stark-network
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # ✅ Alert Service with Agent
  alert-service:
    build:
      context: .
      dockerfile: starkDistribuidos-alert/Dockerfile
    container_name: stark-alert-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-stark_security_db}
      DB_USER: ${DB_USER:-stark_user}
      DB_PASSWORD: ${DB_PASSWORD:-stark_secure_password_123}
      # Message Brokers
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      KAFKA_BROKERS: kafka:9092
      # Cache
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_password}
      # Service
      SERVICE_NAME: alert-service
      SERVICE_AGENT_ENABLED: "true"
    ports:
      - "8083:8083"
    networks:
      - stark-network
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # ✅ Access Control Service with Agent
  access-service:
    build:
      context: .
      dockerfile: starkDistribuidos-access/Dockerfile
    container_name: stark-access-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-stark_security_db}
      DB_USER: ${DB_USER:-stark_user}
      DB_PASSWORD: ${DB_PASSWORD:-stark_secure_password_123}
      # Message Brokers
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      KAFKA_BROKERS: kafka:9092
      # Cache
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_password}
      # Service
      SERVICE_NAME: access-service
      SERVICE_AGENT_ENABLED: "true"
    ports:
      - "8084:8084"
    networks:
      - stark-network
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # ✅ Notification Service with Agent
  notification-service:
    build:
      context: .
      dockerfile: starkDistribuidos-notification/Dockerfile
    container_name: stark-notification-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # Message Brokers
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      KAFKA_BROKERS: kafka:9092
      # Cache
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_password}
      # Mail
      MAIL_HOST: ${MAIL_HOST:-mailhog}
      MAIL_PORT: ${MAIL_PORT:-1025}
      # Service
      SERVICE_NAME: notification-service
      SERVICE_AGENT_ENABLED: "true"
    ports:
      - "8085:8085"
    networks:
      - stark-network
    depends_on:
      - config-server
      - rabbitmq
      - kafka
      - redis
      - mailhog
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # ✅ Frontend Service
  frontend-service:
    build:
      context: .
      dockerfile: starkDistribuidos-frontend/Dockerfile
    container_name: stark-frontend-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-stark_security_db}
      DB_USER: ${DB_USER:-stark_user}
      DB_PASSWORD: ${DB_PASSWORD:-stark_secure_password_123}
      # Cache
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_password}
      # Security
      SECURITY_USER_NAME: ${SECURITY_USER_NAME:-admin}
      SECURITY_USER_PASSWORD: ${SECURITY_USER_PASSWORD:-Admin@Secure2024!}
    ports:
      - "8086:8080"
    networks:
      - stark-network
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # ✅ MailHog for testing email
  mailhog:
    image: mailhog/mailhog:latest
    container_name: stark-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - stark-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local
  redis_data:
    driver: local

networks:
  stark-network:
    driver: bridge

