spring:
  application:
    name: StarkDistribuidos
  
  # ✅ SECURITY FIX: DataSource configuration with environment variables
  datasource:
    url: jdbc:h2:file:./data/stark_db
    driverClassName: org.h2.Driver
    username: sa
    password: ''
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  
  # ✅ SECURITY FIX: H2 Console disabled by default
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console
  
  # Configuración JPA/Hibernate
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  # Configuración de Mail
  mail:
    host: localhost
    port: 1025
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  web:
    resources:
      cache:
        period: 31536000
        cachecontrol:
          max-age: 31536000
          public: true
      static-locations:
        - classpath:/static/
      chain:
        strategy:
          content:
            enabled: true
            paths: /stark-security/static/**

# Configuración de Logging
logging:
  level:
    root: INFO
    com.distribuidos.stark: DEBUG
  pattern:
    console: '%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n'

# Configuración de Actuator (Monitorización)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,threaddump
  endpoint:
    health:
      show-details: always

# Configuración del servidor
server:
  port: 8080
  servlet:
    context-path: /stark-security
  compression:
    enabled: true
    min-response-size: 1024
  http2:
    enabled: true
  forward-headers-strategy: framework



# Configuración de aplicación custom
app:
  email:
    from: seguridad@starkindustries.com
    admin: admin@starkindustries.com

---

# PERFIL: PRODUCCIÓN
spring:
  config:
    activate:
      on-profile: production
  datasource:
    url: jdbc:postgresql://localhost:5432/stark_security_db
    driverClassName: org.postgresql.Driver
    username: stark_user
    password: ${DB_PASSWORD:stark_secure_password}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQL10Dialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 50
  
  mail:
    host: ${MAIL_HOST:mail.starkindustries.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

logging:
  level:
    root: WARN
    com.distribuidos.stark: INFO
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'
  file:
    name: logs/stark-app.log
    max-size: 10MB
    max-history: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    min-response-size: 2048

---

# PERFIL: DOCKER
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/stark_security_db
    driverClassName: org.postgresql.Driver
    username: stark_user
    password: stark_secure_password_123
  
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQL10Dialect
    hibernate:
      ddl-auto: update
  
  mail:
    host: mailhog
    port: 1025
    username: test
    password: test

logging:
  level:
    root: INFO
    com.distribuidos.stark: INFO

server:
  port: 8080

