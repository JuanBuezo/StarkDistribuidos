spring:
  application:
    name: stark-auth
  datasource:
    url: jdbc:h2:mem:authdb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

server:
  port: 8081

jwt:
  secret: StarkIndustriesSecuritySystemJWTSecretKeyForMicroservices2024
  expiration: 86400000

