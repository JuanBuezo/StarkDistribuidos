spring:
  application:
    name: stark-auth
  datasource:
    url: jdbc:h2:mem:authdb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update

  # --- SEGURIDAD CONFIGURADA CORRECTAMENTE ---
  security:
    user:
      name: admin
      password: admin123

eureka:
  client:
    service-url:
      defaultZone: http://admin:admin123@eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    

server:
  port: 8081

jwt:
  secret: StarkIndustriesSecuritySystemJWTSecretKeyForMicroservices2024
  expiration: 86400000
  


