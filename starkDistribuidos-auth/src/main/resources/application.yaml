spring:
  application:
    name: stark-auth
  datasource:
    url: jdbc:h2:mem:authdb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
  # ✅ SECURITY FIX: Credentials moved to environment variables
  security:
    user:
      name: ${SECURITY_USER_NAME:admin}
      password: ${SECURITY_USER_PASSWORD:}

# ✅ SECURITY FIX: Eureka client credentials from environment
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:admin}:${EUREKA_PASSWORD}@localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

server:
  port: 8081

# ✅ SECURITY FIX: JWT configuration from environment
jwt:
  secret: ${JWT_SECRET:StarkIndustriesSecuritySystemJWTSecretKeyForMicroservices2024}
  expiration: ${JWT_EXPIRATION:86400000}
  