spring:
  application:
    name: stark-auth
  datasource:
    url: jdbc:h2:file:./data/authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true

  # --- SEGURIDAD CONFIGURADA CORRECTAMENTE ---
  security:
    user:
      name: admin
      password: admin123

eureka:
  client:
    service-url:
      defaultZone: http://admin:admin123@127.0.0.1:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    

server:
  port: 8081

jwt:
  secret: StarkIndustriesSecuritySystemJWTSecretKeyForMicroservices2024
  expiration: 86400000
  